services:
  # RabbitMQ (消息队列)
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: flybook-rabbitmq
    ports:
      - "5672:5672"     # AMQP 协议端口
      - "15672:15672"   # Management UI 管理界面
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Elasticsearch (全文搜索)
  elasticsearch:
    image: elasticsearch:7.17.18
    container_name: flybook-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kibana (ES 可视化)
  kibana:
    image: kibana:7.17.18
    container_name: flybook-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  # Nginx 负载均衡（反向代理两个 FlyBook 实例）
  nginx:
    image: nginx:1.25-alpine
    container_name: flybook-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # 让容器内能访问宿主机的 8081/8082

volumes:
  rabbitmq-data:
  es-data:
