upstream flybook_backend {
    # ip_hash 保证同一 IP 始终连到同一实例（WebSocket 需要 sticky session）
    ip_hash;
    server host.docker.internal:8081;   # 实例 1
    server host.docker.internal:8082;   # 实例 2
}

server {
    listen 80;
    server_name localhost;

    # 普通 HTTP API 请求
    location / {
        proxy_pass http://flybook_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 请求（需要 HTTP 升级）
    location /ws/ {
        proxy_pass http://flybook_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;    # WS 长连接保持 1 小时
        proxy_send_timeout 3600s;
    }
}
