server:
  port: 8081
spring:
  application:
    name: flybook
  # ShardingSphere JDBC Driver 模式
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:shardingsphere.yaml
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10
        concurrency: 2
        max-concurrency: 8
  redis:
    host: 127.0.0.1
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        min-idle: 4
        max-idle: 8
        max-active: 16
        max-wait: 3000ms
  elasticsearch:
    uris: http://127.0.0.1:9200
    connection-timeout: 5s
    socket-timeout: 30s
jackson:
  default-property-inclusion: non_null

mybatis-plus:
  type-aliases-package: com.bytedance.modules,com.bytedance.infrastructure.mq

logging:
  level:
    com.bytedance: debug
    org.springframework.web.socket: debug
    org.springframework.web.socket.server: debug
    javax.websocket: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"

jwt:
  secret: 0IjoxNzY0NDIxNjk3LCJleHAiOjE3NjUwMjY0OTd
  expire-time: 604800000

# 认证配置
auth:
  enabled: false

# 本地存储配置
storage:
  upload-path: D:/FlyBook/imgs/
  # 映射的访问前缀，即 http://localhost:8080/files/...
  access-prefix: /files/
  # 当前后端服务的地址，用于拼接完整URL
  domain: http://localhost:8081

# Snowflake ID 配置
flybook:
  snowflake:
    worker-id: 1
    datacenter-id: 1
  server:
    id: # 留空则自动生成
  mq:
    exchange: flybook.message
    dlx-exchange: flybook.message.dlx
    outbox:
      retry-interval-ms: 10000
      max-retry: 5
      batch-size: 100

# Actuator 健康检查端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
